name: jira-link
description: "Manually link BMAD stories and epics to Jira issues for tracking integration (no sync, just reference)"
author: "BMad"

# Critical variables from config
config_source: "{project-root}/_bmad/bmm/config.yaml"
user_name: "{config_source}:user_name"
communication_language: "{config_source}:communication_language"
date: system-generated
planning_artifacts: "{config_source}:planning_artifacts"
implementation_artifacts: "{config_source}:implementation_artifacts"

# Workflow components
installed_path: "{project-root}/_bmad/bmm/workflows/4-implementation/jira-link"
instructions: "{installed_path}/instructions.md"

# Input files
epics_pattern: "{planning_artifacts}/*epic*.md"
sprints_pattern: "{implementation_artifacts}/sprints/sprint-*.yaml"

# Smart input file references
input_file_patterns:
  epics:
    description: "All epics to find items to link"
    whole: "{planning_artifacts}/*epic*.md"
    sharded: "{planning_artifacts}/*epic*/*.md"
    load_strategy: "FULL_LOAD"
  sprints:
    description: "Sprint files to find stories to link"
    whole: "{implementation_artifacts}/sprints/sprint-*.yaml"
    load_strategy: "FULL_LOAD"
